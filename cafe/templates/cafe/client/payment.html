{% extends 'cafe/base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
    <div class="max-w-md w-full bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl text-center">
        <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-3xl">💳</span>
        </div>
        
        <h2 class="text-2xl font-black dark:text-white uppercase italic mb-2">Оплата заказа №{{ booking.id }}</h2>
        <p class="text-slate-500 mb-6 font-bold">К оплате: <span class="text-blue-600 text-xl">{{ booking.total_price|floatformat:0 }} ₽</span></p>

        <!-- ТУТ МОЖЕТ БЫТЬ РЕАЛЬНАЯ ФОРМА ЮKASSA ИЛИ STRIPE -->
        <div class="space-y-4">
            <input type="text" placeholder="0000 0000 0000 0000" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-white/5 border-none outline-none font-mono">
            <div class="flex gap-4">
                <input type="text" placeholder="ММ/ГГ" class="w-1/2 p-4 rounded-2xl bg-slate-100 dark:bg-white/5 border-none outline-none text-center">
                <input type="text" placeholder="CVC" class="w-1/2 p-4 rounded-2xl bg-slate-100 dark:bg-white/5 border-none outline-none text-center">
            </div>
            
            <button onclick="fakePay()" id="pay-btn" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-600/20 transition hover:scale-105 active:scale-95">
                Оплатить сейчас
            </button>
        </div>
    </div>
</div>

<script>
function fakePay() {
    const btn = document.getElementById('pay-btn');
    btn.innerHTML = "Обработка...";
    btn.disabled = true;
    
    // Имитируем запрос к банку
    setTimeout(() => {
        alert("Оплата прошла успешно! Ваш статус обновится в личном кабинете.");
        window.location.href = "{% url 'profile' %}";
    }, 2000);
}
</script>
{% endblock %}
