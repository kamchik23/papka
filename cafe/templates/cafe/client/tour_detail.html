{% extends 'cafe/base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto py-12 px-4">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-100">
        <div class="md:w-1/2">
            <img src="{% if tour.image %}{{ tour.image.url }}{% else %}/static/cafe/img/{{ tour.title }}.jpg{% endif %}" 
                 class="w-full h-full object-cover" onerror="this.src='/static/cafe/img/фон.jpg'">
        </div>
        <div class="md:w-1/2 p-10">
            <h1 class="text-3xl font-bold mb-4">{{ tour.title }}</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">{{ tour.description }}</p>
            <div class="bg-slate-50 p-6 rounded-2xl mb-8">
                <div class="text-sm text-slate-500 mb-2 font-bold uppercase">Детали тура:</div>
                <div class="flex justify-between font-bold text-slate-800">
                    <span>Даты: {{ tour.start_date }} - {{ tour.end_date }}</span>
                    <span class="text-blue-600">{{ tour.price }} ₽</span>
                </div>
            </div>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">Забронировать тур</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
